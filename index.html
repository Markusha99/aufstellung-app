<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

  :root{
    --ink:#14161B; --paper:#F6F3EC; --paper-dim:#ECE7DC;
    --bayern:#DC052D; --dortmund:#FFD100; --pitch:#1C5F3A;
    --slate:#5B6472; --line:#D8D2C4; --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  .af-root{
    font-family:'Inter',sans-serif; color:var(--ink); display:flex; justify-content:center;
    background:var(--paper-dim); padding:24px 10px; min-height:780px;
  }
  .af-phone{
    width:400px; max-width:100%; background:var(--paper); border-radius:28px;
    box-shadow:0 20px 50px rgba(20,22,27,.25); overflow:hidden; border:1px solid var(--line);
    display:flex; flex-direction:column; height:760px;
  }
  .af-head{
    background:var(--ink); color:var(--paper); padding:16px 18px 14px; flex-shrink:0;
  }
  .af-head-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .af-brand{font-family:'Oswald',sans-serif; font-weight:700; font-size:20px; letter-spacing:.5px; text-transform:uppercase;}
  .af-brand small{display:block; font-family:'Inter',sans-serif; font-weight:400; font-size:10.5px; color:#9BA3AE; text-transform:none; letter-spacing:0; margin-top:2px;}
  .af-viewas{font-family:'JetBrains Mono',monospace; font-size:10px; display:flex; gap:4px; background:#1F2229; border-radius:20px; padding:3px; border:1px solid #2B2F38;}
  .af-viewas button{font-family:inherit; font-size:10px; border:none; background:transparent; color:#8C95A1; padding:5px 10px; border-radius:16px; cursor:pointer;}
  .af-viewas button.active{background:var(--bayern); color:#fff;}
  .af-week{font-family:'JetBrains Mono',monospace; font-size:11px; color:#9BA3AE; margin-top:10px;}
  .af-who{margin-top:2px; font-size:13px; font-weight:600;}
  .af-who .badge{display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; font-size:9px; font-weight:700; margin-right:6px; font-family:'JetBrains Mono',monospace;}

  .af-body{flex:1; overflow-y:auto; padding:16px 16px 90px;}
  .af-body::-webkit-scrollbar{width:0;}

  .af-section-title{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin:0 0 4px;}
  .af-section-sub{font-size:12px; color:var(--slate); margin:0 0 14px; line-height:1.45;}

  /* preferences grid */
  .af-grid{width:100%; border-collapse:collapse; margin-bottom:14px;}
  .af-grid th{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--slate); font-weight:500; padding-bottom:6px; text-align:center;}
  .af-grid th:first-child{text-align:left;}
  .af-grid td.label{font-size:11px; color:var(--slate); padding-right:6px; white-space:nowrap;}
  .af-cell-wrap{padding:3px;}
  .af-cell{
    width:100%; height:34px; border-radius:8px; border:1.5px solid var(--line); background:var(--white);
    cursor:pointer; transition:.12s; position:relative;
  }
  .af-cell:hover{border-color:var(--bayern);}
  .af-cell.off{background:var(--bayern); border-color:var(--bayern);}
  .af-cell.off::after{content:"✕"; color:#fff; font-size:13px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  .af-legend{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--slate); margin-bottom:18px;}
  .af-legend .sw{width:14px; height:14px; border-radius:4px; display:inline-block;}

  /* desired shifts picker */
  .af-desired-wrap{margin-bottom:18px;}
  .af-desired-row{display:flex; gap:6px; margin-top:8px;}
  .af-desired-btn{
    flex:1; height:34px; border-radius:9px; border:1.5px solid var(--line); background:var(--white);
    font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:var(--ink); cursor:pointer; transition:.12s;
  }
  .af-desired-btn:hover{border-color:var(--bayern);}
  .af-desired-btn.active{background:var(--ink); border-color:var(--ink); color:var(--paper);}

  .af-btn{
    width:100%; padding:13px; border-radius:12px; border:none; font-family:'Inter',sans-serif;
    font-weight:600; font-size:13.5px; cursor:pointer; text-align:center;
  }
  .af-btn-primary{background:var(--ink); color:var(--paper);}
  .af-btn-ghost{background:transparent; color:var(--bayern); border:1.5px solid var(--bayern); margin-top:10px;}
  .af-btn-yellow{background:var(--dortmund); color:var(--ink);}

  .af-card{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:10px;}
  .af-card-row{display:flex; justify-content:space-between; align-items:center;}

  /* match widget */
  .af-match{
    display:flex; align-items:center; gap:10px; background:var(--ink); color:var(--paper);
    border-radius:14px; padding:11px 13px; margin-bottom:10px;
  }
  .af-match .dot{width:7px; height:7px; border-radius:50%; background:var(--dortmund); flex-shrink:0;}
  .af-match .txt{flex:1; font-size:12px;}
  .af-match .txt b{font-family:'Oswald',sans-serif; font-weight:600; font-size:13px;}
  .af-match .time{font-family:'JetBrains Mono',monospace; font-size:11px; color:#9BA3AE;}
  .af-demo-tag{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:9px; background:var(--dortmund); color:var(--ink); padding:2px 6px; border-radius:5px; margin-left:6px; vertical-align:middle;}

  /* schedule */
  .af-line-head{display:flex; align-items:center; gap:8px; margin:18px 0 8px;}
  .af-line-chip{font-family:'Oswald',sans-serif; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:4px 10px; border-radius:7px; color:#fff;}
  .af-sched-table{width:100%; border-collapse:collapse; font-size:11.5px;}
  .af-sched-table th{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--slate); padding:4px 2px; text-align:center;}
  .af-sched-table td{text-align:center; padding:3px 2px;}
  .af-slot{display:inline-flex; align-items:center; justify-content:center; min-height:30px; width:100%; border-radius:7px; font-size:10.5px; font-weight:600; padding:4px 2px;}
  .af-slot.filled{background:var(--paper-dim); border:1px solid var(--line);}
  .af-slot.empty{background:transparent; border:1.5px dashed var(--line); color:var(--slate); font-weight:400;}

  /* tabbar */
  .af-tabbar{
    position:absolute; bottom:0; left:0; right:0; height:64px; background:#fff;
    border-top:1px solid var(--line); display:flex;
  }
  .af-tab{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--slate); background:none; border:none; font-family:'Inter',sans-serif;}
  .af-tab svg{width:20px; height:20px;}
  .af-tab span{font-size:10px; font-weight:600;}
  .af-tab.active{color:var(--bayern);}

  .af-phone-wrap{position:relative; height:760px;}

  /* admin list */
  .af-user-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .af-user-row:last-child{border-bottom:none;}
  .af-avatar{width:30px; height:30px; border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; font-family:'Oswald',sans-serif; flex-shrink:0;}
  .af-user-name{font-size:12.5px; font-weight:600; flex:1;}
  .af-user-meta{font-size:10.5px; color:var(--slate);}
  .af-pill{font-family:'JetBrains Mono',monospace; font-size:9.5px; padding:3px 7px; border-radius:20px; font-weight:600;}
  .af-pill.ok{background:#E3EFE8; color:var(--pitch);}
  .af-pill.wait{background:#FBE9E9; color:var(--bayern);}
  .af-role-select{font-family:'JetBrains Mono',monospace; font-size:10px; border:1px solid var(--line); border-radius:7px; padding:4px 6px; background:#fff;}

  .af-empty{font-size:12px; color:var(--slate); text-align:center; padding:30px 10px; border:1.5px dashed var(--line); border-radius:14px;}

  .af-modal-overlay{position:absolute; inset:0; background:rgba(20,22,27,.55); display:none; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .af-modal-overlay.show{display:flex;}
  .af-modal{background:#fff; border-radius:16px; padding:20px; width:100%;}
  .af-modal h4{font-family:'Oswald',sans-serif; margin:0 0 10px; font-size:15px;}
  .af-modal input{width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:9px; font-size:12.5px; margin-bottom:10px; font-family:'Inter',sans-serif;}
  .af-modal-actions{display:flex; gap:8px;}
  .af-modal-actions button{flex:1;}

  .af-toast{
    position:absolute; bottom:78px; left:16px; right:16px; background:var(--ink); color:#fff;
    border-radius:10px; padding:10px 14px; font-size:12px; text-align:center; opacity:0; transition:.25s; pointer-events:none;
  }
  .af-toast.show{opacity:1;}
</style>

<div class="af-root">
  <div class="af-phone-wrap">
  <div class="af-phone">
    <div class="af-head">
      <div class="af-head-top">
        <div class="af-brand">Aufstellung<small>розклад редакції · Telegram Mini App</small></div>
        <div class="af-viewas">
          <button id="vaEditor" class="active" onclick="setViewAs('editor')">Редактор</button>
          <button id="vaAdmin" onclick="setViewAs('admin')">Адмін</button>
        </div>
      </div>
      <div class="af-week">ТИЖДЕНЬ 29.06 – 05.07.2026</div>
      <div class="af-who" id="whoBar"></div>
    </div>

    <div class="af-body" id="afBody"></div>

    <div class="af-tabbar" id="tabbar">
      <button class="af-tab active" data-tab="prefs" onclick="switchTab('prefs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>
        <span>Побажання</span>
      </button>
      <button class="af-tab" data-tab="schedule" onclick="switchTab('schedule')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M8 5v14M14 5v14"/></svg>
        <span>Розклад</span>
      </button>
      <button class="af-tab" data-tab="matches" onclick="switchTab('matches')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 3v3l3 2M12 21v-3l-3-2M3 12h3l2 3M21 12h-3l-2-3"/></svg>
        <span>Матчі</span>
      </button>
      <button class="af-tab" data-tab="admin" onclick="switchTab('admin')" id="adminTabBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
        <span>Адмін</span>
      </button>
    </div>

    <div class="af-modal-overlay" id="vacModalOv">
      <div class="af-modal">
        <h4>Запит на відпустку</h4>
        <input id="vacFrom" type="date" value="2026-07-13">
        <input id="vacTo" type="date" value="2026-07-20">
        <input id="vacNote" type="text" placeholder="Коментар (необов'язково)">
        <div class="af-modal-actions">
          <button class="af-btn af-btn-ghost" style="margin-top:0" onclick="closeVacModal()">Скасувати</button>
          <button class="af-btn af-btn-primary" onclick="submitVacation()">Надіслати</button>
        </div>
      </div>
    </div>
    <div class="af-toast" id="toast"></div>
  </div>
  </div>
</div>

<script>
(function(){
  const DAYS = ["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];
  const DAY_DATES = ["29.06","30.06","01.07","02.07","03.07","04.07","05.07"];
  const SHIFTS = ["ранок","вечір"];
  const RANK = {senior:3, middle:2, junior:1};
  const ROLE_LABEL = {senior:"Senior", middle:"Middle", junior:"Junior", admin:"Admin"};
  const ROLE_INITIAL = {senior:"S", middle:"M", junior:"J", admin:"A"};

  const LINES = [
    {key:"blogs",  label:"Blogs",      level:"senior", split:false, color:"var(--bayern)"},
    {key:"welt",   label:"Welt",       level:"junior", split:true,  color:"var(--ink)"},
    {key:"bayern", label:"Bayern/BVB", level:"middle", split:true,  color:"var(--pitch)"},
    {key:"de",     label:"DE",         level:"middle", split:true,  color:"#7A5C2E"},
  ];

  const editors = [
    {id:1, name:"Олег Петренко", role:"senior"},
    {id:2, name:"Марина Ковальчук", role:"senior"},
    {id:3, name:"Андрій Сидоренко", role:"middle"},
    {id:4, name:"Ірина Власюк", role:"middle"},
    {id:5, name:"Дмитро Левченко", role:"middle"},
    {id:6, name:"Софія Мельник", role:"middle"},
    {id:7, name:"Назар Ткаченко", role:"junior"},
    {id:8, name:"Юлія Бойко", role:"junior"},
    {id:9, name:"Кирило Романюк", role:"junior"},
    {id:10, name:"Аня Федорів", role:"junior"},
  ];

  // prefs[editorId][day][shift] = true  -> НЕ може працювати
  const prefs = {};
  editors.forEach(e=>{
    prefs[e.id] = {};
    DAYS.forEach(d=>{ prefs[e.id][d] = {"ранок":false, "вечір":false}; });
  });
  // трохи демо-даних, щоб показати вже заповнені побажання
  prefs[3]["Пн"]["вечір"]=true; prefs[3]["Вт"]["ранок"]=true; prefs[3]["Вт"]["вечір"]=true;
  prefs[5]["Сб"]["ранок"]=true; prefs[5]["Сб"]["вечір"]=true;
  prefs[7]["Чт"]["ранок"]=true; prefs[9]["Нд"]["ранок"]=true; prefs[9]["Нд"]["вечір"]=true;
  prefs[1]["Пт"]["ранок"]=true;

  // хто вже подав побажання на цей тиждень (демо)
  const submitted = {1:true,2:true,3:true,4:true,5:false,6:true,7:false,8:true,9:false,10:true};

  // desiredShifts[editorId] = скільки змін людина готова взяти цього тижня (0–7)
  const desiredShifts = {1:5, 2:4, 3:5, 4:6, 5:5, 6:4, 7:5, 8:5, 9:3, 10:5};

  const vacations = [
    {id:1, editorId:2, from:"2026-07-13", to:"2026-07-20", status:"pending", note:""},
  ];

  // демо-дані матчів — НЕ реальні дані, лише приклад верстки
  const MATCHES = [
    {day:"Сб", time:"18:30", home:"Bayern München", away:"—", comp:"Bundesliga · приклад"},
    {day:"Вт", time:"20:45", home:"Германія", away:"—", comp:"збірна · приклад"},
  ];

  let viewAs = "editor";
  let currentEditorId = 4; // Ірина Власюк, middle — "я" в ролі редактора
  let activeTab = "prefs";
  let schedule = null; // заповнюється після generateSchedule()

  function eligible(role, requiredLevel){ return RANK[role] >= RANK[requiredLevel]; }

  function isUnavailableForLine(editorId, day, shift, line){
    if(line.split) return !!prefs[editorId][day][shift];
    return !!(prefs[editorId][day]["ранок"] && prefs[editorId][day]["вечір"]); // Blogs без поділу — недоступний лише якщо весь день закрито
  }

  function generateSchedule(){
    const sched = {}; DAYS.forEach(d=> sched[d] = {});
    LINES.forEach(line=> DAYS.forEach(day=>{
      sched[day] = sched[day] || {};
      sched[day][line.key] = {};
      (line.split ? SHIFTS : ["full"]).forEach(shift=> sched[day][line.key][shift] = null);
    }));

    const worked = {}; editors.forEach(e=> worked[e.id]=0);
    const cap = {}; editors.forEach(e=> cap[e.id]= submitted[e.id] ? (desiredShifts[e.id] ?? 0) : 0);
    // одна людина — один слот на день, тримаємо окремо per day
    const takenToday = {}; DAYS.forEach(d=> takenToday[d] = new Set());

    // лінії обробляємо від найвищого рівня до найнижчого:
    // спочатку Senior-лінії (Blogs), потім Middle (Bayern/BVB, DE), потім Junior (Welt) —
    // це не "хто кому належить", а порядок ФАЗИ 1 нижче забезпечує власне пріоритет.
    const linesByLevelDesc = [...LINES].sort((a,b)=> RANK[b.level]-RANK[a.level]);

    function tryFill(day, line, shift, exactLevelOnly){
      if(sched[day][line.key][shift] !== null) return; // вже зайнято
      const candidates = editors.filter(e=>
        (exactLevelOnly ? e.role===line.level : eligible(e.role, line.level)) &&
        !takenToday[day].has(e.id) &&
        worked[e.id] < cap[e.id] &&
        !isUnavailableForLine(e.id, day, shift==="full" ? "ранок" : shift, line)
      );
      if(candidates.length===0) return;
      candidates.sort((a,b)=>{
        // пріоритет тим, у кого більший лишок невикористаних бажаних змін (cap - worked)
        const remA = cap[a.id]-worked[a.id], remB = cap[b.id]-worked[b.id];
        if(remA!==remB) return remB-remA;
        return worked[a.id]-worked[b.id];
      });
      const chosen = candidates[0];
      sched[day][line.key][shift] = chosen.id;
      takenToday[day].add(chosen.id);
      worked[chosen.id]++;
    }

    // ФАЗА 1 — "рідні" лінії: людина заповнює лінію точно свого рівня
    // (senior → Blogs; middle → Bayern/BVB та DE; junior → Welt) в межах своєї cap.
    DAYS.forEach(day=>{
      linesByLevelDesc.forEach(line=>{
        (line.split ? SHIFTS : ["full"]).forEach(shift=> tryFill(day, line, shift, true));
      });
    });

    // ФАЗА 2 — добір: якщо на лінії нижчого рівня не вистачило людей точного рівня,
    // підключаємо тих, у кого вищий рівень і ще є запас по cap.
    // Senior йде "вниз" в останню черезу — спочатку дозакривають middle, потім junior.
    DAYS.forEach(day=>{
      [...LINES].sort((a,b)=> RANK[a.level]-RANK[b.level]).forEach(line=>{
        (line.split ? SHIFTS : ["full"]).forEach(shift=> tryFill(day, line, shift, false));
      });
    });

    schedule = sched;
  }

  function editorById(id){ return editors.find(e=>e.id===id); }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }

  window.setViewAs = function(v){
    viewAs = v;
    document.getElementById('vaEditor').classList.toggle('active', v==='editor');
    document.getElementById('vaAdmin').classList.toggle('active', v==='admin');
    if(v==='admin' && activeTab!=='admin') switchTab('admin');
    if(v==='editor' && activeTab==='admin') switchTab('prefs');
    render();
  };

  window.switchTab = function(tab){
    activeTab = tab;
    document.querySelectorAll('.af-tab').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
    render();
  };

  function renderWho(){
    const el = document.getElementById('whoBar');
    if(viewAs==='admin'){
      el.innerHTML = `<span class="badge" style="background:var(--bayern)">A</span> Адмін-панель · 10 редакторів`;
    } else {
      const me = editorById(currentEditorId);
      const c = me.role==='senior'?'var(--bayern)':me.role==='middle'?'var(--dortmund)':'var(--slate)';
      const textColor = me.role==='middle' ? 'color:var(--ink)' : 'color:#fff';
      el.innerHTML = `<span class="badge" style="background:${c};${textColor}">${ROLE_INITIAL[me.role]}</span> ${me.name} · ${ROLE_LABEL[me.role]}`;
    }
  }

  function cellsForEditor(editorId){
    let rows = SHIFTS.map(shift=>{
      let cells = DAYS.map(day=>{
        const off = prefs[editorId][day][shift];
        return `<td class="af-cell-wrap"><div class="af-cell ${off?'off':''}" onclick="toggleCell(${editorId},'${day}','${shift}')"></div></td>`;
      }).join('');
      return `<tr><td class="label">${shift}</td>${cells}</tr>`;
    }).join('');
    return rows;
  }

  window.toggleCell = function(editorId, day, shift){
    prefs[editorId][day][shift] = !prefs[editorId][day][shift];
    render();
  };

  window.setDesired = function(editorId, n){
    desiredShifts[editorId] = n;
    render();
  };

  window.savePrefs = function(){
    submitted[currentEditorId] = true;
    showToast('Побажання збережено ✓ Нагадування в Пт/Сб/Нд більше не прийде');
    render();
  };

  window.openVacModal = function(){ document.getElementById('vacModalOv').classList.add('show'); };
  window.closeVacModal = function(){ document.getElementById('vacModalOv').classList.remove('show'); };
  window.submitVacation = function(){
    const from = document.getElementById('vacFrom').value;
    const to = document.getElementById('vacTo').value;
    vacations.push({id:vacations.length+1, editorId:currentEditorId, from, to, status:"pending", note:document.getElementById('vacNote').value});
    closeVacModal();
    showToast('Запит на відпустку надіслано адміну');
    render();
  };

  window.setRole = function(editorId, role){
    editorById(editorId).role = role;
    schedule = null;
    showToast(editorById(editorId).name+' тепер '+ROLE_LABEL[role]);
    render();
  };

  window.runGenerate = function(){
    generateSchedule();
    showToast('Розклад на тиждень згенеровано');
    render();
  };

  window.resolveVac = function(id, status){
    vacations.find(v=>v.id===id).status = status;
    render();
  };

  function renderPrefsPanel(){
    const targetId = viewAs==='admin' ? currentEditorId : currentEditorId; // у демо завжди показуємо побажання "себе"
    return `
      <div class="af-section-title">Коли не можу працювати</div>
      <div class="af-section-sub">Натисни на клітинку, якщо в цю зміну ти точно не зможеш вийти. Решта вважається доступною — побажання максимально враховуються під час побудови розкладу.</div>
      <table class="af-grid">
        <thead><tr><th></th>${DAYS.map((d,i)=>`<th>${d}<br><span style="opacity:.6">${DAY_DATES[i]}</span></th>`).join('')}</tr></thead>
        <tbody>${cellsForEditor(targetId)}</tbody>
      </table>
      <div class="af-legend"><span class="sw" style="background:var(--bayern)"></span> не можу &nbsp;&nbsp; <span class="sw" style="background:#fff;border:1.5px solid var(--line)"></span> можу працювати</div>
      <div class="af-desired-wrap">
        <div class="af-section-sub" style="margin-bottom:0">Скільки змін готовий(а) взяти цього тижня?</div>
        <div class="af-desired-row">
          ${[0,1,2,3,4,5,6,7].map(n=>`<button class="af-desired-btn ${desiredShifts[targetId]===n?'active':''}" onclick="setDesired(${targetId},${n})">${n}</button>`).join('')}
        </div>
      </div>
      <button class="af-btn af-btn-primary" onclick="savePrefs()">Зберегти побажання на тиждень</button>
      <button class="af-btn af-btn-ghost" onclick="openVacModal()">🌴 Запросити відпустку</button>
    `;
  }

  function slotLabel(editorId){
    if(editorId===null) return `<span class="af-slot empty">—</span>`;
    const e = editorById(editorId);
    return `<span class="af-slot filled">${e.name.split(' ')[0]}</span>`;
  }

  function renderSchedulePanel(){
    if(!schedule){
      return `<div class="af-section-title">Розклад на тиждень</div>
        <div class="af-section-sub">Ще не згенеровано. Адмін формує розклад щонеділі — після цього він з'явиться тут автоматично.</div>
        <div class="af-empty">Розклад відсутній</div>`;
    }
    let html = `<div class="af-section-title">Розклад на тиждень</div><div class="af-section-sub">Згенеровано з урахуванням побажань, рівнів доступу та одного слоту на день для кожної людини.</div>`;
    LINES.forEach(line=>{
      const rows = line.split ? SHIFTS : ["full"];
      html += `<div class="af-line-head"><span class="af-line-chip" style="background:${line.color}">${line.label}</span><span style="font-size:10.5px;color:var(--slate)">рівень: ${ROLE_LABEL[line.level]}+</span></div>`;
      html += `<table class="af-sched-table"><thead><tr><th></th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(shift=>{
        html += `<tr><td style="font-size:10px;color:var(--slate);text-align:left">${shift==='full'?'день':shift}</td>`;
        DAYS.forEach(day=>{ html += `<td>${slotLabel(schedule[day][line.key][shift])}</td>`; });
        html += `</tr>`;
      });
      html += `</tbody></table>`;
    });
    return html;
  }

  function renderMatchesPanel(){
    let html = `<div class="af-section-title">Матчі цього тижня <span class="af-demo-tag">демо</span></div>
      <div class="af-section-sub">Підвантажується автоматично: Bayern та Borussia Dortmund — з OpenLigaDB, збірна Німеччини — з API-Football. Дні з матчами підсвічуються в розкладі.</div>`;
    if(MATCHES.length===0){
      html += `<div class="af-empty">На цьому тижні матчів немає (міжсезоння / міжнародне вікно без участі команд)</div>`;
    } else {
      MATCHES.forEach(m=>{
        html += `<div class="af-match"><span class="dot"></span><div class="txt"><b>${m.home}</b> — ${m.away}<br><span style="color:#9BA3AE">${m.comp}</span></div><div class="time">${m.day}<br>${m.time}</div></div>`;
      });
    }
    return html;
  }

  function renderAdminPanel(){
    let pending = editors.filter(e=>!submitted[e.id]);
    let html = `<div class="af-section-title">Команда</div><div class="af-section-sub">10 редакторів · ${pending.length} ще не подали побажання на цей тиждень.</div>`;
    html += `<div class="af-card">`;
    editors.forEach(e=>{
      const ok = submitted[e.id];
      html += `<div class="af-user-row">
        <div class="af-avatar">${e.name.split(' ').map(p=>p[0]).join('')}</div>
        <div style="flex:1">
          <div class="af-user-name">${e.name}</div>
          <div class="af-user-meta">бажано змін: ${ok ? desiredShifts[e.id] : '0 (не подано)'} · нагадування Пт/Сб/Нд 09:00</div>
        </div>
        <select class="af-role-select" onchange="setRole(${e.id}, this.value)">
          <option value="senior" ${e.role==='senior'?'selected':''}>Senior</option>
          <option value="middle" ${e.role==='middle'?'selected':''}>Middle</option>
          <option value="junior" ${e.role==='junior'?'selected':''}>Junior</option>
        </select>
        <span class="af-pill ${ok?'ok':'wait'}">${ok?'подано':'очікує'}</span>
      </div>`;
    });
    html += `</div>`;
    html += `<button class="af-btn af-btn-yellow" onclick="runGenerate()">⚙️ Згенерувати розклад на тиждень</button>`;
    html += `<button class="af-btn af-btn-ghost" onclick="showToast('Лінк-запрошення скопійовано (демо)')">+ Запросити редактора</button>`;

    html += `<div class="af-section-title" style="margin-top:22px">Запити на відпустку</div>`;
    if(vacations.length===0){ html += `<div class="af-empty">Запитів немає</div>`; }
    vacations.forEach(v=>{
      const e = editorById(v.editorId);
      html += `<div class="af-card"><div class="af-card-row">
        <div><b style="font-size:12.5px">${e.name}</b><div class="af-user-meta">${v.from} – ${v.to}</div></div>
        <span class="af-pill ${v.status==='approved'?'ok':v.status==='declined'?'wait':'wait'}">${v.status==='pending'?'на розгляді':v.status==='approved'?'схвалено':'відхилено'}</span>
      </div>`;
      if(v.status==='pending'){
        html += `<div style="display:flex;gap:8px;margin-top:9px">
          <button class="af-btn af-btn-primary" style="padding:8px;font-size:11.5px" onclick="resolveVac(${v.id},'approved')">Схвалити</button>
          <button class="af-btn af-btn-ghost" style="padding:8px;font-size:11.5px;margin-top:0" onclick="resolveVac(${v.id},'declined')">Відхилити</button>
        </div>`;
      }
      html += `</div>`;
    });

    if(schedule){
      html += `<div class="af-section-title" style="margin-top:22px">Поточний розклад</div>`;
      html += renderSchedulePanelBody();
    }
    return html;
  }

  function renderSchedulePanelBody(){
    let html = '';
    LINES.forEach(line=>{
      const rows = line.split ? SHIFTS : ["full"];
      html += `<div class="af-line-head"><span class="af-line-chip" style="background:${line.color}">${line.label}</span></div>`;
      html += `<table class="af-sched-table"><thead><tr><th></th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>`;
      rows.forEach(shift=>{
        html += `<tr><td style="font-size:10px;color:var(--slate);text-align:left">${shift==='full'?'день':shift}</td>`;
        DAYS.forEach(day=>{ html += `<td>${slotLabel(schedule[day][line.key][shift])}</td>`; });
        html += `</tr>`;
      });
      html += `</tbody></table>`;
    });
    return html;
  }

  function render(){
    renderWho();
    document.getElementById('adminTabBtn').style.display = viewAs==='admin' ? '' : 'none';
    if(viewAs!=='admin' && activeTab==='admin') activeTab='prefs';
    document.querySelectorAll('.af-tab').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));

    const body = document.getElementById('afBody');
    if(activeTab==='prefs') body.innerHTML = renderPrefsPanel();
    else if(activeTab==='schedule') body.innerHTML = renderSchedulePanel();
    else if(activeTab==='matches') body.innerHTML = renderMatchesPanel();
    else if(activeTab==='admin') body.innerHTML = renderAdminPanel();
  }

  render();
})();
</script>
